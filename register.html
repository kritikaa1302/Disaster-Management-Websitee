<!DOCTYPE HTML>
<html>
    <head>
        <title>Register - Disaster Management</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="assets/css/main.css" />
        <style>
            body {
                background-image: url('https://media.wired.com/photos/611fe3bb14f54599e207a822/master/w_1920,c_limit/Gear-How-to-Emotionally-Prepare-for-Disaster-1234774221.jpg');
                background-size: cover;
                background-position: center;
                font-family: 'Times New Roman', serif;
                color: #FFD700;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            }
            .register-box {
                width: 400px;
                margin: auto;
                background: rgba(0, 0, 0, 0.9);
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.5);
                text-align: center;
            }
            h2 {
                font-size: 32px;
            }
            label, p {
                font-size: 20px;
            }
            input, select, button {
                width: 100%;
                padding: 12px;
                margin: 12px 0;
                border: 1px solid #fff;
                border-radius: 5px;
                background: rgba(255, 255, 255, 0.2);
                color: #fff;
                font-size: 18px;
            }
            select {
                color: #000;
                background: #fff;
            }
            button {
                background-color: #ff9800;
                color: white;
                font-size: 20px;
                cursor: pointer;
                border: none;
                transition: 0.3s;
            }
            button:hover {
                background-color: #e68900;
            }
            a {
                color: #ff9800;
                text-decoration: none;
                font-size: 20px;
            }
            a:hover {
                text-decoration: underline;
            }
        </style>
        <script>
            function register(event) {
                event.preventDefault(); 
                
                let username = document.getElementById("username").value;
                let email = document.getElementById("email").value;
                let password = document.getElementById("password").value;
                let role = document.getElementById("role").value;
                
                if (username && email && password) {
                    alert("Registration successful as " + role + "!");
                    window.location.href = "login.html"; // Redirect to login page
                } else {
                    alert("Please fill out all fields.");
                }
            }
        </script>
    </head>
    <body>
        <header id="header">
            <div class="logo"><a href="index.html" style="color: white;">DISASTER MANAGEMENT</a></div>
            <a href="#menu" style="color: white;">Menu</a>
        </header>
        
        <section id="register" class="wrapper">
            <div class="register-box">
                <h2>Register</h2>
                <form onsubmit="register(event)">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                    
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>

                    <label for="role">Register as:</label>
                    <select id="role" name="role" required>
                        <option value="citizen">Citizen</option>
                        <option value="rescue">Rescue Agency</option>
                    </select>

                    <button type="submit">Register</button>
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </form>
            </div>
        </section>
        
        <footer id="footer">
            <div class="container">
                <p>&copy; Disaster Management. All rights reserved.</p>
            </div>
        </footer>
    </body>
</html>
